name: Nightly Full Run

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nightly:
    name: Full Regression
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [Chromium, Firefox, Webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 8.0.x }

      - run: dotnet build PlaywrightWithDotnet.slnx -c Release

      - name: Install Playwright
        shell: pwsh
        run: |
          $script = Get-ChildItem -Recurse -Filter playwright.ps1 |
                    Where-Object { $_.FullName -match 'Tests\.UI[\\/]bin[\\/]Release' } |
                    Select-Object -First 1
          pwsh -File $script.FullName install --with-deps ${{ matrix.browser }}

      - name: Run regression
        shell: pwsh
        env:
          TEST_ENV: qa
        run: |
          pwsh -File scripts/run-tests.ps1 -Configuration Release -Environment qa -Category All -Browsers ${{ matrix.browser }} -Suite All

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.browser }}
          path: |
            TestResults/**
            tests/**/allure-results/**
            tests/**/bin/Release/net8.0/allure-results/**

  publish-allure:
    name: Publish Nightly Allure to GitHub Pages
    needs: nightly
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Aggregate allure results
        run: |
          mkdir -p allure-results
          find artifacts -type d -name allure-results -exec sh -c 'cp -r "$1"/* allure-results/ 2>/dev/null || true' _ {} \;

      - uses: simple-elf/allure-report-action@v1.9
        with:
          allure_results: allure-results
          allure_history: allure-history
          gh_pages: gh-pages
          subfolder: nightly

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          keep_files: true
